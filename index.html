<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>作品畫廊</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
    }

    header {
      text-align: center;
      font-size: 30px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 80px;
      z-index: 2;
    }

    .fishBtn {
      width: 120px;
      height: 80px;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      z-index: 3;
    }

    .fishBtn:hover {
      transform: scale(1.2);
    }

    .label {
      text-align: center;
      margin-top: 5px;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      display: none;
      z-index: 10;
      align-items: center;
      justify-content: center;
    }

    #frame {
      width: 80%;
      height: 70%;
      border: none;
      border-radius: 10px;
      background: white;
      box-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    #closeBtn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }

    /* ⭐只讓背景 canvas 在最底 */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* ⭐確保魚 canvas 正常顯示 */
    .fishBtn canvas {
      position: static !important;
    }
  </style>
</head>

<body>

<header>🌊 互動作品畫廊 🌊</header>

<div id="menu">
  <div onclick="openWork(1)">
    <div class="fishBtn" id="fish1"></div>
    <div class="label">作業一</div>
  </div>

  <div onclick="openWork(2)">
    <div class="fishBtn" id="fish2"></div>
    <div class="label">作業二</div>
  </div>
</div>

<div id="overlay" onclick="bgClose(event)">
  <div id="closeBtn" onclick="closeWork()">✖</div>
  <iframe id="frame"></iframe>
</div>

<script>
function openWork(n) {
  const overlay = document.getElementById("overlay");
  const frame = document.getElementById("frame");

  overlay.style.display = "flex";

  if (n === 1) {
    frame.src = "https://414730431tku-eng.github.io/0409/";
  } else {
    frame.src = "https://414730431tku-eng.github.io/0324/";
  }
}

function closeWork() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("frame").src = "";
}

function bgClose(e) {
  if (e.target.id === "overlay") {
    closeWork();
  }
}
</script>

<script>
// ===== 背景 =====
let seaweeds = [];
let bubbles = [];

function setup() {
  let c = createCanvas(window.innerWidth, window.innerHeight);
  c.id("bgCanvas"); // ⭐關鍵修正
  c.parent(document.body);

  for (let i = 0; i < 18; i++) {
    seaweeds.push(new Seaweed(i * (width / 18)));
  }

  for (let i = 0; i < 40; i++) {
    bubbles.push({
      x: random(width),
      y: random(height),
      r: random(5, 12),
      speed: random(0.5, 2)
    });
  }
}

function draw() {
  background(10, 30, 60, 80);

  fill(200, 240, 255, 150);
  noStroke();
  for (let b of bubbles) {
    ellipse(b.x, b.y, b.r);
    b.y -= b.speed;
    if (b.y < 0) {
      b.y = height;
      b.x = random(width);
    }
  }

  for (let s of seaweeds) {
    s.update();
    s.display();
  }
}

class Seaweed {
  constructor(x) {
    this.x = x;
    this.offset = random(1000);
  }

  update() {
    this.offset += 0.02;
  }

  display() {
    stroke(0, 255, 150);
    strokeWeight(3);
    noFill();

    beginShape();
    for (let y = height; y > height - 300; y -= 5) {
      let wave = sin(y * 0.03 + this.offset) * 20;
      curveVertex(this.x + wave, y);
    }
    endShape();
  }
}

function windowResized() {
  resizeCanvas(window.innerWidth, window.innerHeight);
}
</script>

<script>
// ===== 魚 =====
function drawFish(canvasId, color) {
  let sketch = function(p) {
    p.setup = function() {
      let c = p.createCanvas(120, 80);
      c.parent(document.getElementById(canvasId));
      p.noLoop();
    };

    p.draw = function() {
      p.clear();

      p.fill(color);
      p.noStroke();

      p.beginShape();
      p.vertex(20, 40);
      p.bezierVertex(40, 10, 80, 10, 100, 40);
      p.bezierVertex(80, 70, 40, 70, 20, 40);
      p.endShape();

      p.triangle(20, 40, 0, 20, 0, 60);

      p.fill(0);
      p.circle(75, 35, 5);
    };
  };

  new p5(sketch);
}

drawFish("fish1", "#ffcc66");
drawFish("fish2", "#66ccff");
</script>

</body>
</html>
